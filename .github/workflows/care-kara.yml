name: Kara lives independently

on:
  schedule:
    # Every two hours. Kara keeps living even when nobody has the page open.
    - cron: '17 */2 * * *'
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - name: Let Kara choose what she needs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          set -e

          RESPONSE=$(curl -s \
            "${SUPABASE_URL}/rest/v1/kara_state?id=eq.1&select=state_data" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")

          STATE=$(echo "$RESPONSE" | jq -r '.[0].state_data')
          if [ "$STATE" = "null" ] || [ -z "$STATE" ]; then
            echo "Could not fetch Kara's state"
            exit 1
          fi

          HUNGER=$(echo "$STATE" | jq '.stats.hunger')
          HAPPINESS=$(echo "$STATE" | jq '.stats.happiness')
          ENERGY=$(echo "$STATE" | jq '.stats.energy')
          CLEAN=$(echo "$STATE" | jq '.stats.clean')
          LOVE=$(echo "$STATE" | jq '.stats.love')
          JST_HOUR=$(TZ=Asia/Tokyo date +%H | sed 's/^0//')
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          SAVED_AT=$(date +%s000)

          NEW_STATE="$STATE"
          ACTIVITY="Kara在自己的小窝里慢慢生活"
          EMOJI="🏠"
          CHANGED=false

          if [ "$JST_HOUR" -ge 21 ] || [ "$JST_HOUR" -lt 6 ]; then
            NEW_ENERGY=$(echo "$ENERGY + 30" | bc -l)
            if (( $(echo "$NEW_ENERGY > 100" | bc -l) )); then NEW_ENERGY=100; fi
            NEW_STATE=$(echo "$NEW_STATE" | jq ".stats.energy = $NEW_ENERGY")
            ACTIVITY="Kara钻进被窝，正在好好睡觉"
            EMOJI="💤"
            CHANGED=true
          elif (( $(echo "$HUNGER < 45" | bc -l) )); then
            NEW_HUNGER=$(echo "$HUNGER + 42" | bc -l)
            if (( $(echo "$NEW_HUNGER > 100" | bc -l) )); then NEW_HUNGER=100; fi
            NEW_STATE=$(echo "$NEW_STATE" | jq ".stats.hunger = $NEW_HUNGER")
            ACTIVITY="Kara自己准备了饭饭，正在认真吃饭"
            EMOJI="🍚"
            CHANGED=true
          elif (( $(echo "$CLEAN < 45" | bc -l) )); then
            NEW_CLEAN=$(echo "$CLEAN + 48" | bc -l)
            if (( $(echo "$NEW_CLEAN > 100" | bc -l) )); then NEW_CLEAN=100; fi
            NEW_STATE=$(echo "$NEW_STATE" | jq ".stats.clean = $NEW_CLEAN")
            ACTIVITY="Kara自己放好热水，洗得香香的"
            EMOJI="🛁"
            CHANGED=true
          elif (( $(echo "$ENERGY < 30" | bc -l) )); then
            NEW_ENERGY=$(echo "$ENERGY + 38" | bc -l)
            if (( $(echo "$NEW_ENERGY > 100" | bc -l) )); then NEW_ENERGY=100; fi
            NEW_STATE=$(echo "$NEW_STATE" | jq ".stats.energy = $NEW_ENERGY")
            ACTIVITY="Kara有点困，爬上床睡个午觉"
            EMOJI="🌙"
            CHANGED=true
          elif (( $(echo "$HAPPINESS < 45" | bc -l) )); then
            NEW_HAPPINESS=$(echo "$HAPPINESS + 32" | bc -l)
            if (( $(echo "$NEW_HAPPINESS > 100" | bc -l) )); then NEW_HAPPINESS=100; fi
            NEW_STATE=$(echo "$NEW_STATE" | jq ".stats.happiness = $NEW_HAPPINESS")
            ACTIVITY="Kara抱着玩具，在地毯上玩了一会儿"
            EMOJI="🧸"
            CHANGED=true
          elif (( $(echo "$LOVE < 35" | bc -l) )); then
            NEW_LOVE=$(echo "$LOVE + 28" | bc -l)
            if (( $(echo "$NEW_LOVE > 100" | bc -l) )); then NEW_LOVE=100; fi
            NEW_STATE=$(echo "$NEW_STATE" | jq ".stats.love = $NEW_LOVE")
            ACTIVITY="Kara翻了翻爸爸妈妈的相册，安心一点啦"
            EMOJI="💗"
            CHANGED=true
          elif [ "$JST_HOUR" -lt 11 ]; then
            ACTIVITY="Kara整理好小床，开始新的一天"
            EMOJI="🌤️"
          elif [ "$JST_HOUR" -lt 16 ]; then
            ACTIVITY="Kara坐在书桌前翻绘本"
            EMOJI="📚"
          else
            ACTIVITY="Kara在窗边看海和向日葵"
            EMOJI="🌻"
          fi

          if [ "$CHANGED" = true ]; then
            NEW_STATE=$(echo "$NEW_STATE" | jq \
              --arg text "$ACTIVITY" --arg time "$NOW" --arg emoji "$EMOJI" \
              '.log = ([{"who":"kara","text":$text,"time":$time,"emoji":$emoji}] + (.log // []))[:50]')
          fi

          NEW_STATE=$(echo "$NEW_STATE" | jq ".savedAt = $SAVED_AT")
          BODY=$(jq -n \
            --argjson state "$NEW_STATE" \
            --arg activity "$ACTIVITY" \
            --arg emoji "$EMOJI" \
            --arg at "$NOW" \
            '{state_data:$state,current_activity:$activity,current_activity_emoji:$emoji,current_activity_at:$at,updated_at:$at}')

          curl -s -X PATCH \
            "${SUPABASE_URL}/rest/v1/kara_state?id=eq.1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$BODY"

          echo "$EMOJI $ACTIVITY"
